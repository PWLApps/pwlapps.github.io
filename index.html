<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PWL Apps</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 60px 20px 40px;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 2px;
        }

        header p {
            margin-top: 12px;
            font-size: 1.1rem;
            color: #888;
        }

        .apps-grid {
            max-width: 960px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 32px;
        }

        .app-card {
            background: #1a1a2e;
            border-radius: 20px;
            padding: 36px 28px;
            text-align: center;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            border: 1px solid #2a2a4a;
        }

        .app-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(100, 80, 200, 0.15);
        }

        .app-card .icon {
            width: 140px;
            height: 140px;
            border-radius: 28px;
            object-fit: cover;
            margin-bottom: 20px;
        }

        .app-card h2 {
            font-size: 1.4rem;
            color: #fff;
            margin-bottom: 12px;
        }

        .app-card .description {
            font-size: 0.95rem;
            color: #aaa;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .app-card .store-badge {
            display: inline-block;
        }

        .app-card .store-badge img {
            height: 48px;
        }

        .app-card .privacy-link {
            display: block;
            margin-top: 12px;
            font-size: 0.8rem;
            color: #666;
            text-decoration: none;
        }

        .app-card .privacy-link:hover {
            color: #a78bfa;
            text-decoration: underline;
        }

        footer {
            text-align: center;
            padding: 60px 20px 40px;
            color: #555;
            font-size: 0.85rem;
        }

        .lang-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            border-radius: 30px;
            padding: 6px 16px;
            cursor: pointer;
            z-index: 100;
            user-select: none;
        }

        .lang-toggle .flag {
            font-size: 1.2rem;
            opacity: 0.4;
            transition: opacity 0.2s;
            line-height: 1;
        }

        .lang-toggle .flag.active {
            opacity: 1;
        }

        .lang-toggle .switch {
            width: 36px;
            height: 20px;
            background: #2a2a4a;
            border-radius: 10px;
            position: relative;
            transition: background 0.2s;
        }

        .lang-toggle .switch::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            background: #a78bfa;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: transform 0.2s;
        }

        .lang-toggle.en .switch::after {
            transform: translateX(16px);
        }
    </style>
</head>
<body>
    <div id="home-toggle"></div>

    <header>
        <h1>PWL Apps</h1>
        <p id="home-subtitle"></p>
    </header>

    <main class="apps-grid" id="home-cards"></main>

    <footer id="home-footer"></footer>

    <script src="shared.js"></script>
    <script>initHomePage();</script>
</body>
</html>
